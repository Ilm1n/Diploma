name: lighttask_dev

services:
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${LIGHTTASK_CONFIG__DB__USER}
      POSTGRES_PASSWORD: ${LIGHTTASK_CONFIG__DB__PASSWORD}
      POSTGRES_DB: ${LIGHTTASK_CONFIG__DB__NAME}
    ports:
      - "${LIGHTTASK_CONFIG__DB__PORT:-5432}:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LIGHTTASK_CONFIG__DB__USER} -d ${LIGHTTASK_CONFIG__DB__NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend/light_task
      dockerfile: Dockerfile
    command: uvicorn src.main:main_app --host ${LIGHTTASK_CONFIG__RUN__HOST:-0.0.0.0} --port ${LIGHTTASK_CONFIG__RUN__PORT:-8000} --reload
    volumes:
      - ./backend/light_task/src:/app/src
      - ./backend/light_task/alembic:/app/alembic
      - ./backend/light_task/certs:/app/certs
    ports:
      - "${LIGHTTASK_CONFIG__RUN__PORT:-8000}:${LIGHTTASK_CONFIG__RUN__PORT:-8000}"
    env_file:
      - .env
    environment:
      - LIGHTTASK_CONFIG__DB__HOST=db
      - LIGHTTASK_CONFIG__REALTIME__REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data_dev:
