name: lighttask_prod

services:
  gateway:
    image: ghcr.io/${IMAGE_REPO_OWNER}/lighttask-frontend:${IMAGE_TAG:-main}
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - frontend-api
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:15.6-alpine3.19
    restart: unless-stopped
    environment:
      POSTGRES_USER: lighttask_user
      POSTGRES_DB: lighttask
      POSTGRES_PASSWORD: ${LIGHTTASK_CONFIG__DB__PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lighttask_user -d lighttask"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-db
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 300M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-db
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    image: ghcr.io/${IMAGE_REPO_OWNER}/lighttask-backend:${IMAGE_TAG:-main}
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./certs:/app/certs:ro
    environment:
      - LIGHTTASK_CONFIG__DB__HOST=db
      - LIGHTTASK_CONFIG__DB__PORT=5432
      - LIGHTTASK_CONFIG__DB__USER=lighttask_user
      - LIGHTTASK_CONFIG__DB__NAME=lighttask
      - LIGHTTASK_CONFIG__DB__ECHO=0
      - LIGHTTASK_CONFIG__S3__BACKEND=s3
      - LIGHTTASK_CONFIG__RUN__HOST=0.0.0.0
      - LIGHTTASK_CONFIG__RUN__PORT=8000
      - LIGHTTASK_CONFIG__RUN__CORS_ORIGINS=[]
      - LIGHTTASK_CONFIG__INVITE__BASE_URL=https://kantano.ru/invite
      - LIGHTTASK_CONFIG__REALTIME__REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - frontend-api
      - backend-db
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 400M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  frontend-api:
  backend-db:

volumes:
  postgres_data_prod:
  caddy_data:
  caddy_config:
