name: lighttask_prod

services:
  caddy:
    image: caddy:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - frontend-api
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: lighttask_user
      POSTGRES_DB: lighttask
      POSTGRES_PASSWORD: ${LIGHTTASK_CONFIG__DB__PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lighttask_user -d lighttask"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend-db
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 300M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    image: ghcr.io/${IMAGE_REPO_OWNER}/lighttask-backend:${IMAGE_TAG:-main}
    restart: always
    env_file: .env
    volumes:
      - ./certs:/app/certs:ro
    environment:
      - LIGHTTASK_CONFIG__DB__HOST=db
      - LIGHTTASK_CONFIG__DB__PORT=5432
      - LIGHTTASK_CONFIG__DB__USER=lighttask_user
      - LIGHTTASK_CONFIG__DB__NAME=lighttask
      - LIGHTTASK_CONFIG__DB__ECHO=0

      - LIGHTTASK_CONFIG__RUN__HOST=0.0.0.0
      - LIGHTTASK_CONFIG__RUN__PORT=8000

      - LIGHTTASK_CONFIG__RUN__CORS_ORIGINS=[]
      - LIGHTTASK_CONFIG__INVITE__BASE_URL=https://do-coop.ru/invite
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - frontend-api
      - backend-db
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 400M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ghcr.io/${IMAGE_REPO_OWNER}/lighttask-frontend:${IMAGE_TAG:-main}
    restart: always
    depends_on:
      - backend
    networks:
      - frontend-api
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 150M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  frontend-api:
  backend-db:

volumes:
  postgres_data_prod:
  caddy_data:
  caddy_config: