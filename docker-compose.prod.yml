name: lighttask_prod

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${LIGHTTASK_CONFIG__DB__USER}
      POSTGRES_PASSWORD: ${LIGHTTASK_CONFIG__DB__PASSWORD}
      POSTGRES_DB: ${LIGHTTASK_CONFIG__DB__NAME}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LIGHTTASK_CONFIG__DB__USER} -d ${LIGHTTASK_CONFIG__DB__NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  backend:
    build:
      context: ./backend/light_task
      dockerfile: Dockerfile
    command: 
      - gunicorn 
      - src.main:main_app 
      - --workers
      - "4"
      - --worker-class
      - uvicorn.workers.UvicornWorker
      - --bind
      - ${LIGHTTASK_CONFIG__RUN__HOST}:${LIGHTTASK_CONFIG__RUN__PORT}
    restart: always
    ports:
      - "${LIGHTTASK_CONFIG__RUN__PORT}:${LIGHTTASK_CONFIG__RUN__PORT}"
    volumes:
      - ./backend/light_task/certs:/app/certs:ro
    env_file:
      - .env
    environment:
      - LIGHTTASK_CONFIG__DB__HOST=db
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${LIGHTTASK_CONFIG__RUN__PORT}/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

volumes:
  postgres_data_prod: