name: Deploy to Production

on:
#  push:
#    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_REPO_OWNER: ilm1n
  REPO_NAME: ${{ github.event.repository.name }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase REPO_NAME
        run: |
          echo "REPO_NAME_LC=${REPO_NAME,,}" >>${GITHUB_ENV}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend/light_task
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO_OWNER }}/lighttask-backend:main

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/light-task-frontend
          file: ./frontend/light-task-frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO_OWNER }}/lighttask-frontend:main

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout config
        uses: actions/checkout@v4

      - name: Copy docker-compose via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          source: "docker-compose.prod.yml"
          target: "/home/${{ secrets.VPS_USER }}/app"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ env.IMAGE_REPO_OWNER }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          envs: GITHUB_TOKEN,OWNER
          script: |
            mkdir -p ~/app
            cd ~/app
            
            echo $GITHUB_TOKEN | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            echo "${{ secrets.PROD_ENV_FILE }}" > .env
            
            echo "IMAGE_REPO_OWNER=$OWNER" >> .env
            
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans
            
            docker image prune -af

  cleanup:
    name: Cleanup Old Images
    needs: deploy
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Delete Untagged Backend Images
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'lighttask-backend'
          package-type: 'container'
          min-versions-to-keep: 1
          delete-only-untagged-versions: 'true'

      - name: Delete Untagged Frontend Images
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'lighttask-frontend'
          package-type: 'container'
          min-versions-to-keep: 1
          delete-only-untagged-versions: 'true'