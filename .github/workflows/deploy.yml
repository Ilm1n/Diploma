name: Deploy to Production

on:
  # push:
  #   branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_REPO_OWNER: ilm1n

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v5
      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

  build-backend:
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend/light_task
          push: true
          pull: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO_OWNER }}/lighttask-backend:main
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO_OWNER }}/lighttask-backend:${{ needs.prepare.outputs.sha_short }}

  build-frontend:
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend/light-task-frontend
          file: ./frontend/light-task-frontend/Dockerfile
          push: true
          pull: true
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO_OWNER }}/lighttask-frontend:main
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO_OWNER }}/lighttask-frontend:${{ needs.prepare.outputs.sha_short }}

  deploy:
    runs-on: ubuntu-latest
    needs: [prepare, build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v5
      - name: Create config and certs
        env:
          TAG: ${{ needs.prepare.outputs.sha_short }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          S3_ACCESS: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET: ${{ secrets.S3_SECRET_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET_NAME }}
          OWNER: ${{ env.IMAGE_REPO_OWNER }}
          JWT_PRIVATE: ${{ secrets.JWT_PRIVATE_KEY }}
          JWT_PUBLIC: ${{ secrets.JWT_PUBLIC_KEY }}
          SWAGGER_HASH: ${{ secrets.SWAGGER_HASH }}
          YANDEX_CLIENT_ID: ${{ secrets.YANDEX_CLIENT_ID }}
          YANDEX_CLIENT_SECRET: ${{ secrets.YANDEX_CLIENT_SECRET }}
          YANDEX_REDIRECT_URI: ${{ secrets.YANDEX_REDIRECT_URI }}
          FRONTEND_BASE_URL: ${{ secrets.FRONTEND_BASE_URL }}
        run: |
          cat <<EOF > .env.prod
          LIGHTTASK_CONFIG__DB__PASSWORD=$DB_PASSWORD
          LIGHTTASK_CONFIG__S3__BACKEND=s3
          LIGHTTASK_CONFIG__S3__ACCESS_KEY=$S3_ACCESS
          LIGHTTASK_CONFIG__S3__SECRET_KEY=$S3_SECRET
          LIGHTTASK_CONFIG__S3__BUCKET_NAME=$S3_BUCKET
          LIGHTTASK_CONFIG__YANDEX__CLIENT_ID=$YANDEX_CLIENT_ID
          LIGHTTASK_CONFIG__YANDEX__CLIENT_SECRET=$YANDEX_CLIENT_SECRET
          LIGHTTASK_CONFIG__YANDEX__REDIRECT_URI=$YANDEX_REDIRECT_URI
          LIGHTTASK_CONFIG__FRONTEND__BASE_URL=$FRONTEND_BASE_URL
          IMAGE_REPO_OWNER=$OWNER
          IMAGE_TAG=$TAG
          SWAGGER_HASH='$SWAGGER_HASH'
          EOF
          
          mkdir -p certs
          printf "%s" "$JWT_PRIVATE" > certs/jwt-private.pem
          printf "%s" "$JWT_PUBLIC" > certs/jwt-public.pem

      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          source: "docker-compose.prod.yml,.env.prod,Caddyfile,certs/"
          target: "/home/${{ secrets.VPS_USER }}/app"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          envs: GITHUB_TOKEN,ACTOR
          script: |
            set -e

            retry() {
              attempts="$1"
              delay="$2"
              shift 2
              run_number=1

              until "$@"; do
                if [ "$run_number" -ge "$attempts" ]; then
                  return 1
                fi

                echo "Attempt ${run_number}/${attempts} failed. Retrying in ${delay}s..."
                run_number=$((run_number + 1))
                sleep "$delay"
              done
            }

            docker_login_ghcr() {
              echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin
            }

            pull_images() {
              docker compose -f docker-compose.prod.yml pull
            }

            cd ~/app
            if [ -f .env.prod ]; then mv .env.prod .env; fi
            chmod 600 certs/*.pem

            retry 5 10 docker_login_ghcr
            retry 5 15 pull_images

            docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans --wait

            docker image prune -af --filter "until=24h"

  cleanup:
    name: Cleanup Registry
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete Old Backend Images
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'lighttask-backend'
          package-type: 'container'
          min-versions-to-keep: 5
          delete-only-untagged-versions: 'false'

      - name: Delete Old Frontend Images
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'lighttask-frontend'
          package-type: 'container'
          min-versions-to-keep: 5
          delete-only-untagged-versions: 'false'
