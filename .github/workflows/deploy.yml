name: Deploy to Production

on:
  # push:
  #   branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_REPO_OWNER: ilm1n
  REPO_NAME: ${{ github.event.repository.name }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend/light_task
          push: true
          no-cache: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO_OWNER }}/lighttask-backend:main
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO_OWNER }}/lighttask-backend:${{ steps.vars.outputs.sha_short }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/light-task-frontend
          file: ./frontend/light-task-frontend/Dockerfile
          push: true
          no-cache: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO_OWNER }}/lighttask-frontend:main
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO_OWNER }}/lighttask-frontend:${{ steps.vars.outputs.sha_short }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout config
        uses: actions/checkout@v4

      - name: Create config and certs
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          S3_ACCESS: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET: ${{ secrets.S3_SECRET_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET_NAME }}

          OWNER: ${{ env.IMAGE_REPO_OWNER }}
          TAG: ${{ needs.build-and-push.outputs.sha_short }}

          JWT_PRIVATE: ${{ secrets.JWT_PRIVATE_KEY }}
          JWT_PUBLIC: ${{ secrets.JWT_PUBLIC_KEY }}
        run: |
          echo "LIGHTTASK_CONFIG__DB__PASSWORD=$DB_PASSWORD" >> .env.prod
          echo "LIGHTTASK_CONFIG__S3__ACCESS_KEY=$S3_ACCESS" >> .env.prod
          echo "LIGHTTASK_CONFIG__S3__SECRET_KEY=$S3_SECRET" >> .env.prod
          echo "LIGHTTASK_CONFIG__S3__BUCKET_NAME=$S3_BUCKET" >> .env.prod
          
          echo "" >> .env.prod
          echo "IMAGE_REPO_OWNER=$OWNER" >> .env.prod
          echo "IMAGE_TAG=$TAG" >> .env.prod
            
          mkdir -p certs
          printf "%s" "$JWT_PRIVATE" > certs/jwt-private.pem
          printf "%s" "$JWT_PUBLIC" > certs/jwt-public.pem

      - name: Copy files via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          source: "docker-compose.prod.yml,.env.prod,Caddyfile,certs/"
          target: "/home/${{ secrets.VPS_USER }}/app"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          envs: GITHUB_TOKEN,ACTOR
          script: |
            set -e
            cd ~/app
            if [ -f .env.prod ]; then
              mv .env.prod .env
            fi
            
            chmod 600 certs/*.pem
            
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin
            
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans
            
            docker image prune -af

  cleanup:
    name: Cleanup Registry
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete Old Backend Images
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'lighttask-backend'
          package-type: 'container'
          min-versions-to-keep: 2
          delete-only-untagged-versions: 'false'

      - name: Delete Old Frontend Images
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'lighttask-frontend'
          package-type: 'container'
          min-versions-to-keep: 2
          delete-only-untagged-versions: 'false'